name: Release

# Runs ONLY when a version tag is pushed (e.g. `v0.2.0`). A normal push to a
# branch does nothing — pushing a `v*` tag is the explicit "make a release" signal.
on:
  push:
    tags:
      - "v*"

jobs:
  release:
    permissions:
      contents: write # needed to create the GitHub Release and upload assets
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest # universal build → one .dmg for Intel + Apple Silicon
            args: "--target universal-apple-darwin"
          - platform: ubuntu-22.04
            args: ""
          - platform: windows-latest
            args: ""
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Cache Rust
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "./src-tauri -> target"

      - name: Install Linux build dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Install frontend dependencies
        working-directory: ./web
        run: npm ci

      - name: Build, sign, and publish the release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Tauri updater signing key — set as repo secrets (NOT the Apple cert).
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "Evolve ${{ github.ref_name }}"
          releaseBody: "Download the installer for your platform below. Installed apps update themselves automatically."
          releaseDraft: false
          prerelease: false
          # Generates the signed `latest.json` updater manifest and uploads it as a
          # release asset — this is what the app polls on launch.
          includeUpdaterJson: true
          args: ${{ matrix.args }}
